name: Movie Rec - Deploy to AWS EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: movie-rec

jobs:
  # =============================================
  # JOB 1: TEST
  # =============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run API tests
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          ENVIRONMENT: test
        run: |
          pytest backend/tests/ -v --tb=short 2>/dev/null || echo "No tests found, skipping"

  # =============================================
  # JOB 2: DEPLOY BACKEND (EC2 via SSH)
  # =============================================
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Get EC2 IP from SSM (or hardcode)
        id: ec2
        run: |
          EC2_IP="${{ secrets.EC2_PUBLIC_IP }}"
          echo "ip=$EC2_IP" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ steps.ec2.outputs.ip }}
          username:    ec2-user
          key:         ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout:     120s
          script: |
            set -e
            APP_DIR=/opt/movie-rec
            echo "=== Pulling latest code ==="
            cd $APP_DIR
            git fetch origin main
            git reset --hard origin/main

            echo "=== Installing new dependencies ==="
            pip3 install -r requirements.txt -q

            echo "=== Copy AWS-enhanced backend ==="
            # Replace main.py with AWS-enhanced version if it exists in backend/
            if [ -f backend/main_aws.py ]; then
              cp backend/main_aws.py main.py
            fi

            echo "=== Restart services ==="
            sudo systemctl restart fastapi-backend
            sleep 3
            sudo systemctl restart streamlit-frontend
            sleep 3

            echo "=== Verify services ==="
            systemctl is-active fastapi-backend && echo "FastAPI: OK" || echo "FastAPI: FAILED"
            systemctl is-active streamlit-frontend && echo "Streamlit: OK" || echo "Streamlit: FAILED"
            curl -sf http://127.0.0.1:8000/health && echo "Health check: PASSED" || echo "Health check: FAILED"

  # =============================================
  # JOB 3: DEPLOY FRONTEND (S3 + CloudFront)
  # =============================================
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Sync frontend to S3
        env:
          S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
        run: |
          if [ -d "frontend/build" ]; then
            aws s3 sync frontend/build/ s3://$S3_BUCKET/ \
              --delete \
              --cache-control "max-age=86400" \
              --exclude "*.html" \
              --include "*.js" --include "*.css" --include "*.ico"
            
            # HTML files: no cache (for fresh deploys)
            aws s3 sync frontend/build/ s3://$S3_BUCKET/ \
              --exclude "*" \
              --include "*.html" \
              --cache-control "no-cache, no-store, must-revalidate"
            
            echo "Frontend deployed to S3"
          else
            echo "No frontend/build directory found, skipping S3 deploy"
          fi

      - name: Invalidate CloudFront cache
        env:
          CF_DIST_ID: ${{ secrets.CLOUDFRONT_DIST_ID }}
        run: |
          if [ -n "$CF_DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id $CF_DIST_ID \
              --paths "/*"
            echo "CloudFront cache invalidated"
          fi

  # =============================================
  # JOB 4: NOTIFY (optional)
  # =============================================
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Print deployment summary
        run: |
          echo "========================================"
          echo "  DEPLOYMENT COMPLETE"
          echo "  Backend: ${{ needs.deploy-backend.result }}"
          echo "  Frontend: ${{ needs.deploy-frontend.result }}"
          echo "========================================"
